<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Novella</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --ink: #1a1a1a; --paper: #faf7f2; --warm: #f5f0e8; --gold: #c9963a; --muted: #8a8278; --border: #e0d9cf; }
        body { font-family: Georgia, 'Times New Roman', serif; background: var(--paper); color: var(--ink); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .box { width: 320px; }
        .logo { font-size: 1.6rem; letter-spacing: 0.08em; text-align: center; margin-bottom: 2rem; display: block; }
        .logo span { color: var(--gold); }
        label { display: block; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.4rem; }
        input[type=password] { width: 100%; padding: 0.75rem; border: 1px solid var(--border); background: #fff; font-family: Georgia, serif; font-size: 1rem; color: var(--ink); margin-bottom: 1rem; }
        input:focus { outline: none; border-color: var(--ink); }
        button { width: 100%; background: var(--ink); color: var(--paper); border: none; padding: 0.85rem; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 0.9rem; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; }
        button:hover { background: #333; }
        .error { color: #c0392b; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 0.85rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="box">
        <a class="logo">Novell<span>a</span> · Admin</a>
        {% if error %}<p class="error">Wrong password.</p>{% endif %}
        <form action="/admin/login" method="post">
            <label>Password</label>
            <input type="password" name="password" autofocus>
            <button type="submit">Sign in</button>
        </form>
    </div>
</body>
</html>
